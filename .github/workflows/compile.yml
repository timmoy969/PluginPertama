name: Build Minecraft Plugin

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Compile Java Files
      run: |
        mkdir -p build/classes
        
        # Mengunduh library kompilasi lewat repositori Maven pusat resmi yang diizinkan oleh GitHub
        mvn dependency:get -Dartifact=org.spigotmc:spigot-api:1.20.4-R0.1-SNAPSHOT -DremoteRepositories=https://spigotmc.org -Dtransitive=false
        
        # Menyalin file yang berhasil diunduh dengan aman ke direktori kerja
        cp ~/.m2/repository/org/spigotmc/spigot-api/1.20.4-R0.1-SNAPSHOT/spigot-api-*.jar ./spigot.jar
        
        # Menjalankan proses kompilasi kode Java
        javac -d build/classes -cp spigot.jar src/com/info/Main.java
        
        # Mengemas paket aplikasi menjadi file JAR final
        cp plugin.yml build/classes/
        cd build/classes
        jar cf ../../PluginPertama.jar .

    - name: Upload Plugin Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PluginPertama-JAR
        path: PluginPertama.jar
        
