name: Build Minecraft Plugin

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Compile Java Files
      run: |
        # Memastikan file spigot.jar lama yang rusak dihapus total dari cache
        rm -f spigot.jar
        
        # Membuat folder tujuan kompilasi
        mkdir -p build/classes
        
        # Mengunduh Paper API baru menggunakan wget yang lebih stabil
        wget -q "https://papermc.io" -O spigot.jar
        
        # Kompilasi file Java
        javac -d build/classes -cp spigot.jar src/com/info/Main.java
        
        # Memasukkan berkas konfigurasi ke dalam plugin
        cp plugin.yml build/classes/
        cd build/classes
        jar cf ../../PluginPertama.jar .

    - name: Upload Plugin Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PluginPertama-JAR
        path: PluginPertama.jar
        
