name: Build Minecraft Plugin

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Compile Java Files
      run: |
        mkdir -p build/classes
        
        # Mengunduh Bukkit API dari repositori Maven Central resmi (dijamin ada dan aman)
        mvn dependency:get -Dartifact=org.bukkit:bukkit:1.16.5-R0.1-SNAPSHOT -DremoteRepositories=https://apache.org -Dtransitive=false
        
        # Menyalin file library yang terunduh ke direktori lokal
        cp ~/.m2/repository/org/bukkit/bukkit/1.16.5-R0.1-SNAPSHOT/bukkit-1.16.5-R0.1-SNAPSHOT.jar ./spigot.jar
        
        # Kompilasi kode Java
        javac -d build/classes -cp spigot.jar src/com/info/Main.java
        
        # Pengemasan menjadi file JAR final
        cp plugin.yml build/classes/
        cd build/classes
        jar cf ../../PluginPertama.jar .

    - name: Upload Plugin Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PluginPertama-JAR
        path: PluginPertama.jar
        
